{# 共通スクリプト #}
<script>
(function() {
  const API = window.location.origin;
  const TAROU_SRC = "{{ url_for('static', filename='tarou.png') }}";

  const QUICK_TOPICS = [
    "営業時間を教えて",
    "データ復旧の料金",
    "月額コンサルの相談",
    "ホームページ制作",
    "ホリエモン出版について",
    "お問い合わせ方法"
  ];

  const GREETING_LINES = [
    "こんにちは!IT Support パソコン太郎です。",
    "",
    "お困りごと、何でもお気軽にご相談ください。",
    "下のメニューから選ぶか、お気軽にメッセージをどうぞ!"
  ];

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const resetBtn = document.getElementById("resetBtn");

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function renderText(str) {
    // URL を必ずクリック可能にする
    // 1) Markdown link [text](url) を <a> に
    // 2) 裸URL → URL-safe な文字のみ拾い、末尾の句読点・カッコは除外
    //    (半角・全角の括弧、日本語句読点、引用符などをURLに含めない)
    let s = escapeHtml(str);
    // 太字
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Markdown形式 [text](url) を <a> に
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)）]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener" style="color:#d72027;">$1</a>');

    // 裸URL: 半角URL-safe文字のみマッチ。日本語/全角/カッコ/引用符でストップ。
    // 末尾の句読点(. , ! ? ; : 、 。)は除去する。
    const URL_RE = /(https?:\/\/[A-Za-z0-9\-._~:\/?#@!$&'*+=%]+)/g;
    s = s.replace(URL_RE, (match) => {
      let url = match;
      // 末尾の句読点を剥がす
      while (/[.,!?;:]$/.test(url)) url = url.slice(0, -1);
      // 末尾の閉じカッコ ) があってかつ対応する ( がURL内にない場合も剥がす
      if (url.endsWith(')') && !url.slice(0, -1).includes('(')) url = url.slice(0, -1);
      return `<a href="${url}" target="_blank" rel="noopener" style="color:#d72027;">${url}</a>`;
    });
    return s;
  }

  function addBot(text, opts = {}) {
    const wrap = document.createElement("div");
    wrap.className = "message bot" + (opts.error ? "" : "");
    const img = document.createElement("img");
    img.src = TAROU_SRC;
    img.alt = "パソコン太郎";
    img.className = "bot-avatar";
    wrap.appendChild(img);
    const b = document.createElement("div");
    b.className = "bubble" + (opts.error ? " error" : "");
    b.innerHTML = renderText(text);
    wrap.appendChild(b);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function addUser(text) {
    const wrap = document.createElement("div");
    wrap.className = "message user";
    const b = document.createElement("div");
    b.className = "bubble";
    b.innerHTML = renderText(text);
    wrap.appendChild(b);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function addDatePill() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const pill = document.createElement("div");
    pill.className = "date-pill";
    pill.textContent = `${yyyy}/${mm}/${dd}`;
    messagesEl.appendChild(pill);
  }

  function addQuickList() {
    const list = document.createElement("div");
    list.className = "quick-list";
    QUICK_TOPICS.forEach(topic => {
      const btn = document.createElement("button");
      btn.className = "quick-item";
      btn.textContent = topic;
      btn.addEventListener("click", () => {
        list.remove();
        send(topic);
      });
      list.appendChild(btn);
    });
    messagesEl.appendChild(list);
    scrollToBottom();
    return list;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message bot typing";
    wrap.id = "typing-indicator";
    const img = document.createElement("img");
    img.src = TAROU_SRC;
    img.className = "bot-avatar";
    wrap.appendChild(img);
    const b = document.createElement("div");
    b.className = "bubble";
    b.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(b);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function callApi(text) {
    const res = await fetch(API + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.reply;
  }

  async function send(text) {
    if (!text) return;
    addUser(text);
    inputEl.value = "";
    updateSendBtn();
    sendBtn.disabled = true;
    showTyping();
    try {
      const reply = await callApi(text);
      removeTyping();
      addBot(reply);
    } catch (e) {
      removeTyping();
      addBot(`⚠️ エラー: ${e.message}\nしばらくしてからもう一度お試しください。`, { error: true });
    } finally {
      sendBtn.disabled = false;
    }
  }

  function updateSendBtn() {
    const has = inputEl.value.trim().length > 0;
    sendBtn.classList.toggle("ready", has);
  }

  async function reset() {
    await fetch(API + "/api/reset", { method: "POST", credentials: "include" }).catch(() => {});
    messagesEl.innerHTML = "";
    init();
  }

  function init() {
    addDatePill();
    addBot(GREETING_LINES.join("\n"));
    addQuickList();
  }

  sendBtn.addEventListener("click", () => send(inputEl.value.trim()));
  inputEl.addEventListener("input", () => {
    updateSendBtn();
    // 入力が始まったら Enter ヒントは引っ込める
    disarmEnter();
  });

  // Enter は「2回押すと送信」方式 (誤送信防止)
  let enterArmed = false;
  let enterTimer = null;

  function getOrCreateHint() {
    let hint = document.getElementById("enterHint");
    if (!hint) {
      hint = document.createElement("div");
      hint.id = "enterHint";
      hint.className = "enter-hint";
      hint.textContent = "もう一度 Enter で送信";
      inputEl.parentElement.appendChild(hint);
    }
    return hint;
  }
  function armEnter() {
    enterArmed = true;
    getOrCreateHint().classList.add("show");
    clearTimeout(enterTimer);
    enterTimer = setTimeout(disarmEnter, 2500);
  }
  function disarmEnter() {
    enterArmed = false;
    const hint = document.getElementById("enterHint");
    if (hint) hint.classList.remove("show");
    clearTimeout(enterTimer);
  }
  inputEl.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) {
      disarmEnter();
      return;
    }
    if (enterArmed) {
      disarmEnter();
      send(text);
    } else {
      armEnter();
    }
  });
  inputEl.addEventListener("blur", disarmEnter);

  if (resetBtn) resetBtn.addEventListener("click", reset);

  // 初期化
  init();
})();
</script>
