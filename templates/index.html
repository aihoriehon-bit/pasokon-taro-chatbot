<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パソコン太郎 お問い合わせチャット</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #e8f4fd 0%, #d0eaff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header { text-align: center; margin-bottom: 16px; }
    header h1 { font-size: 1.5rem; color: #1a5fa8; font-weight: bold; }
    header p { font-size: 0.85rem; color: #555; margin-top: 4px; }

    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 75vh;
      min-height: 480px;
    }

    .chat-header {
      background: linear-gradient(90deg, #1a5fa8, #2e86de);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header img.avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.6);
      background: #fff;
    }

    .chat-header-info { flex: 1; }
    .chat-header-info h2 { font-size: 1rem; font-weight: bold; }
    .chat-header-info p { font-size: 0.75rem; opacity: 0.85; }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4cde80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .reset-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.35); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; gap: 10px; align-items: flex-end; }
    .message.bot { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #f0f4ff;
      border: 2px solid #c8dcf8;
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: #f0f6ff;
      border: 1px solid #c8dcf8;
      color: #1a2a3a;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #1a5fa8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.error {
      background: #fff4f4;
      border-color: #ffb8b8;
      color: #c0392b;
    }

    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }

    .typing .bubble span {
      width: 8px;
      height: 8px;
      background: #1a5fa8;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
    }

    .quick-btn {
      background: #f0f6ff;
      border: 1.5px solid #1a5fa8;
      color: #1a5fa8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-family: inherit;
    }
    .quick-btn:hover { background: #1a5fa8; color: #fff; }
    .quick-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-area {
      border-top: 1px solid #e8eef5;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      background: #fafcff;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #c8dcf8;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #1a5fa8; }

    .send-btn {
      background: #1a5fa8;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #154d8a; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #aaa; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; fill: #fff; }

    footer {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #888;
      text-align: center;
    }
    footer a { color: #1a5fa8; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>IT Support パソコン太郎株式会社</h1>
    <p>お問い合わせチャットサポート (Powered by Gemini)</p>
  </header>

  <div class="chat-wrapper">
    <div class="chat-header">
      <img src="{{ url_for('static', filename='tarou.png') }}" alt="パソコン太郎" class="avatar">
      <div class="chat-header-info">
        <h2>パソコン太郎</h2>
        <p><span class="status-dot"></span>オンライン・応答中</p>
      </div>
      <button class="reset-btn" id="resetBtn">会話をリセット</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="quick-replies" id="quickReplies"></div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="メッセージを入力してください…"
        autocomplete="off"
      >
      <button class="send-btn" id="sendBtn" aria-label="送信">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <footer>
    <a href="https://pasotaro.com/" target="_blank">公式サイト</a> ｜
    <a href="https://pasotaro.com/contact.html" target="_blank">直接お問い合わせ</a>
  </footer>

  <script>
    const API = window.location.origin;

    const QUICK_TOPICS = [
      "営業時間を教えて",
      "電話番号は?",
      "所在地は?",
      "データ復旧の料金",
      "パソコン修理",
      "HP制作の相談",
      "システム開発について",
      "出張対応してる?",
      "支払い方法",
      "コンサル相談",
      "スタッフ紹介",
      "リモートサポート"
    ];

    const GREETING = "こんにちは!IT Support パソコン太郎です 👓\n\nパソコンのお困りごと、何でもお気軽にご相談ください。\n下のボタンから選ぶか、お気軽にメッセージをどうぞ!";

    const TAROU_SRC = "{{ url_for('static', filename='tarou.png') }}";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const quickRepliesEl = document.getElementById("quickReplies");
    const resetBtn = document.getElementById("resetBtn");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderText(str) {
      return escapeHtml(str)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#1a5fa8;">$1</a>');
    }

    function addMessage(text, role, isError = false) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      if (role === "bot") {
        const img = document.createElement("img");
        img.src = TAROU_SRC;
        img.alt = "パソコン太郎";
        img.className = "bot-avatar";
        wrapper.appendChild(img);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble" + (isError ? " error" : "");
      bubble.innerHTML = renderText(text);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function showTyping() {
      const wrapper = document.createElement("div");
      wrapper.className = "message bot typing";
      wrapper.id = "typing-indicator";

      const img = document.createElement("img");
      img.src = TAROU_SRC;
      img.className = "bot-avatar";
      wrapper.appendChild(img);

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = "<span></span><span></span><span></span>";
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    async function callApi(text) {
      const res = await fetch(API + "/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return data.reply;
    }

    async function botReply(userText) {
      showTyping();
      sendBtn.disabled = true;
      try {
        const reply = await callApi(userText);
        removeTyping();
        addMessage(reply, "bot");
      } catch (e) {
        removeTyping();
        addMessage(`⚠️ エラー: ${e.message}\nしばらくしてからもう一度お試しください。`, "bot", true);
      } finally {
        sendBtn.disabled = false;
        showQuickReplies();
      }
    }

    function handleSend() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, "user");
      inputEl.value = "";
      clearQuickReplies();
      botReply(text);
    }

    function showQuickReplies() {
      quickRepliesEl.innerHTML = "";
      QUICK_TOPICS.forEach(topic => {
        const btn = document.createElement("button");
        btn.className = "quick-btn";
        btn.textContent = topic;
        btn.addEventListener("click", () => {
          addMessage(topic, "user");
          clearQuickReplies();
          botReply(topic);
        });
        quickRepliesEl.appendChild(btn);
      });
    }

    function clearQuickReplies() {
      quickRepliesEl.innerHTML = "";
    }

    async function resetChat() {
      await fetch(API + "/api/reset", { method: "POST" }).catch(() => {});
      messagesEl.innerHTML = "";
      addMessage(GREETING, "bot");
      showQuickReplies();
    }

    sendBtn.addEventListener("click", handleSend);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !sendBtn.disabled) handleSend();
    });
    resetBtn.addEventListener("click", resetChat);

    setTimeout(() => {
      addMessage(GREETING, "bot");
      showQuickReplies();
    }, 300);
  </script>
</body>
</html>
