<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIチャットで質問する | IT Support パソコン太郎株式会社</title>
  {% include "_chat_styles.html" %}
  <style>
    body {
      padding: 32px 20px;
      background: #fff;
    }
    .page {
      max-width: 760px;
      margin: 0 auto;
    }
    h1.page-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--black);
      margin-bottom: 8px;
    }
    h1.page-title .accent { color: var(--red); }
    .page-note {
      font-size: 0.78rem;
      color: var(--gray-text);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .page-note a { color: var(--red); }
    .chat-container {
      height: 600px;
      max-height: 80vh;
    }
    footer.page-footer {
      margin-top: 16px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--gray-text);
    }
    footer.page-footer a { color: var(--red); text-decoration: none; }
    footer.page-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="page-title">AIチャットで<span class="accent">質問する</span></h1>
    <p class="page-note">
      ※一部のご利用環境ではチャットボットを表示できない場合があります。その場合は、
      <a href="https://pasotaro.com/contact.html" target="_blank">お問い合わせフォーム</a>をご利用ください。
    </p>

    <div class="chat-shell bordered chat-container">
      <div class="chat-bar">
        <img src="{{ url_for('static', filename='tarou.png') }}" alt="パソコン太郎">
        <div class="bar-info">
          <div class="bar-name">パソコン太郎</div>
          <div class="bar-status">オンライン・応答中</div>
        </div>
        <div class="chat-bar-actions">
          <button id="resetBtn" type="button">会話をリセット</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <input type="text" id="userInput" placeholder="文章で質問を入力してください" autocomplete="off">
        <button class="send" id="sendBtn" type="button">質問する</button>
      </div>
    </div>

    <footer class="page-footer">
      <a href="https://pasotaro.com/" target="_blank">公式サイト</a> ｜
      <a href="https://pasotaro.com/contact.html" target="_blank">直接お問い合わせ</a>
    </footer>
  </div>

  {% include "_chat_script.html" %}
</body>
</html>
