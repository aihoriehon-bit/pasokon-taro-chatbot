{# 共通スタイル(index.html と embed.html で使用) #}
<style>
  :root {
    --red: #d72027;
    --red-dark: #a8161c;
    --red-bg: #fdecec;
    --black: #1a1a1a;
    --gray-text: #6b6b6b;
    --gray-line: #e0e0e0;
    --gray-bg: #f5f5f5;
    --gray-bubble: #efefef;
    --gray-pill: #c8c8c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    color: var(--black);
    background: #fff;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== チャット本体 ===== */
  .chat-shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: #fff;
    overflow: hidden;
  }

  .chat-shell.bordered {
    border: 1.5px solid var(--gray-line);
    border-radius: 12px;
  }

  /* チャットヘッダー (埋め込み版でのみ表示) */
  .chat-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--black);
    color: #fff;
    border-bottom: 3px solid var(--red);
    flex-shrink: 0;
  }

  .chat-bar img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--red);
    background: #fff;
  }

  .chat-bar .bar-info { flex: 1; line-height: 1.25; }
  .chat-bar .bar-name { font-weight: bold; font-size: 0.9rem; }
  .chat-bar .bar-status { font-size: 0.7rem; opacity: 0.8; }
  .chat-bar .bar-status::before {
    content: ""; display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%; background: var(--red);
    margin-right: 4px;
    box-shadow: 0 0 0 2px rgba(215,32,39,0.3);
  }

  .chat-bar-actions { display: flex; gap: 6px; }
  .chat-bar-actions button {
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    border-radius: 12px;
    font-size: 0.7rem;
    padding: 4px 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .chat-bar-actions button:hover {
    background: var(--red);
    border-color: var(--red);
  }

  /* メッセージリスト */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .date-pill {
    align-self: center;
    background: var(--gray-pill);
    color: #fff;
    font-size: 0.7rem;
    padding: 3px 12px;
    border-radius: 999px;
    margin: 4px 0;
    font-weight: 500;
  }

  .message { display: flex; gap: 8px; align-items: flex-start; }
  .message.user { justify-content: flex-end; }

  .bot-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: #fff;
    border: 2px solid var(--red);
  }

  .bubble {
    max-width: 78%;
    padding: 9px 13px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message.bot .bubble {
    background: var(--gray-bg);
    color: var(--black);
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: var(--red);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble strong { color: var(--red); font-weight: bold; }
  .message.user .bubble strong { color: #fff; text-decoration: underline; }

  .bubble.error {
    background: var(--red-bg);
    color: var(--red-dark);
    border: 1px solid var(--red);
  }

  /* タイピング表示 */
  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 11px 14px;
  }
  .typing .bubble span {
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.2s infinite;
  }
  .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* リスト型クイック返信 */
  .quick-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
    padding: 4px 4px 4px 48px; /* avatar の幅分インデント */
  }

  .quick-list.flush { padding-left: 4px; }

  .quick-item {
    background: var(--gray-bg);
    border: 1px solid var(--gray-line);
    color: var(--black);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    font-family: inherit;
    text-align: left;
    font-weight: 500;
  }
  .quick-item:hover {
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red-dark);
  }
  .quick-item:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 入力エリア */
  .composer {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1.5px solid var(--gray-line);
    background: #fff;
    flex-shrink: 0;
  }

  .composer input {
    flex: 1;
    border: 1.5px solid var(--gray-line);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    color: var(--black);
    background: #fff;
    transition: border-color 0.15s;
  }
  .composer input:focus { border-color: var(--red); }
  .composer input::placeholder { color: #aaa; }

  .composer .send {
    background: var(--gray-pill);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0 18px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.2s;
  }
  .composer .send.ready { background: var(--red); }
  .composer .send.ready:hover { background: var(--red-dark); }
  .composer .send:disabled { background: #ccc; cursor: not-allowed; }
</style>
